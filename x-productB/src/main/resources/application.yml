server:
  port: 8083
# 线程池配置（动态可调，不填则使用默认值：core=CPU*2, max=CPU*4）
thread-pool:
  core-size: 8          # 核心线程数
  max-size: 16          # 最大线程数
  keep-alive-seconds: 60 # 空闲线程存活时间（秒）
  queue-capacity: 1000  # 任务队列容量
  thread-name-prefix: xCloud-async-  # 线程名前缀，便于日志追踪
spring:
  task:
    execution:
      shutdown:
        await-termination: true
        await-termination-period: 10s
  #  数据库配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://115.190.21.58:3306/andy_database?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: hy123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-on-borrow: true
      test-on-return: false
      test-while-idle: true
      #是否启用 Druid 的监控统计页面（StatViewServlet）。【访问 http://localhost:8080/druid】如 Spring Boot 3.x 需要额外配置「启动类加：@ServletComponentScan // 启用 Servlet 组件扫描（Druid 的 StatViewServlet 需要）」
      filters: stat,wall,slf4j # 启用 SQL 统计功能、防火墙、日志
      filter:
        stat:
          enabled: true
          slow-sql-millis: 1000 # 慢 SQL 阈值（毫秒）
        wall:
          enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: andy
        login-password: andy
        # 关闭登录验证（不推荐生产环境使用）
        allow: 127.0.0.1  # 允许的 IP（空表示允许所有）
#        deny: 192.168.1.100 # 拒绝的 IP
#    sql:
#      init:
#        mode: always # always: 每次应用启动时都执行指定的 SQL 脚本（schema.sql 和 data.sql），即使数据库已经存在。  never: 不执行任何初始化脚本/embedded: 仅对嵌入式数据库（如 H2）执行脚本。
#        schema-locations: classpath:schema.sql
#        data-locations: classpath:data.sql
#SQL 初始化功能，用于在应用启动时自动执行 SQL 脚本以初始化数据库结构和数据

# mybatis-plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: xCloud.entity
  #  配置mybatis-plus日志必须1
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
#    MyBatis-Plus 默认启用下划线转驼峰命名
    map-underscore-to-camel-case: false

# 日志配置log---INFO---DEBUG
#logging.level.xCloud.openAiChatModel.orchestrator.RagClient=INFO
logging:
  level:
    # nacos日志，查找Nacos连接或配置加载的错误信息
    com.alibaba.nacos: INFO
    #    org.springframework.cloud.alibaba.nacos: INFO
    org.springframework.cloud: INFO
    io.grpc: INFO
    org.springframework.web: INFO
    #  配置mybatis-plus日志必须2
    com.baomidou.mybatisplus: INFO


