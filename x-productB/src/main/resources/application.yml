#langchain4j配置 2
langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY}
      model-name: gpt-4o
      log-requests: true
      log-responses: true
    embedding-model:
      api-key: ${OPENAI_API_KEY}
      model-name: text-embedding-3-small

#
# application.properties 或启动参数
#JAVA_OPTS"-Xlog:library=off"
#rag
rag:
  url: http://localhost:8080/api/v1/rag
milvus:
  uri: http://localhost:19530 # Milvus URI（新 V2 使用 URI）
  token: root:Milvus  # 默认 token，生产环境替换
  host: localhost
  port: 19530   # Docker 默认端口
#  LLM--，语言模型、向量模型，分别是两个不同的模型，但是key是可以共用的
openai:
  api-key: ${OPENAI_API_KEY}
  #使用了 ${OPENAI_API_KEY} 语法，会从系统环境变量中读取值.密钥不能在项目里写出来，需要配置在系统环境变量中
  model: text-embedding-3-small # 或者 text-embedding-3-large（按需）
#  阿里百炼平台，千问大模型
ali:
  api-key: ${DASHSCOPE_API_KEY}
  chat_model_name: qwen-plus
  embedding_model_name: text-embedding-v4
  baseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
# Milvus vector dimension (和模型输出维度一致)
vector:
  dim: 1024
  collection: andy_vectorsV2
deepSeek:
  api:
    url: https://api.deepseek.com
    key: ${DEEPSEEK_API_KEY}
# 百川
baichuan:
  api:
    url: https://api.baichuan-ai.com/v1/embeddings
    key: ${BAICHUAN_API_KEY}
hdbscan:
  service:
    url: http://localhost:8001
llm:
  api:
    url: https://api.deepseek.com/v1/chat/completions
